services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthapp}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend/HealthApp
      dockerfile: ./HealthApp/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__EFPostgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-healthapp};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Auth__Jwt__Issuer: ${AUTH_JWT_ISSUER:-HealthApp.Backend}
      Auth__Jwt__Audience: ${AUTH_JWT_AUDIENCE:-HealthApp.Mobile}
      Auth__Jwt__SigningKey: ${AUTH_JWT_SIGNING_KEY:-replace-with-a-strong-secret-key-of-at-least-32-chars}
      Auth__Google__AllowedClientIds__0: ${AUTH_GOOGLE_ALLOWED_CLIENT_ID_0:-}
      Auth__Yandex__ClientId: ${AUTH_YANDEX_CLIENT_ID:-}
      Auth__Yandex__ClientSecret: ${AUTH_YANDEX_CLIENT_SECRET:-}
      Email__Mode: ${EMAIL_MODE:-PickupDirectory}
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:-no-reply@healthtrack.local}
      Email__FromName: ${EMAIL_FROM_NAME:-HealthTrack}
      Email__PickupDirectoryPath: artifacts/mail-drop
      Email__Smtp__Host: ${EMAIL_SMTP_HOST:-}
      Email__Smtp__Port: ${EMAIL_SMTP_PORT:-587}
      Email__Smtp__EnableSsl: ${EMAIL_SMTP_ENABLE_SSL:-true}
      Email__Smtp__Username: ${EMAIL_SMTP_USERNAME:-}
      Email__Smtp__Password: ${EMAIL_SMTP_PASSWORD:-}
      DoctorNoteScanner__Enabled: ${DOCTOR_NOTE_SCANNER_ENABLED:-false}
      DoctorNoteScanner__OpenAI__ApiKey: ${DOCTOR_NOTE_SCANNER_OPENAI_API_KEY:-}
      DoctorNoteScanner__OpenAI__Model: ${DOCTOR_NOTE_SCANNER_OPENAI_MODEL:-gpt-4.1}
    volumes:
      - ./backend/HealthApp/HealthApp/artifacts:/app/artifacts

  frontend:
    build:
      context: ./frontend/health_app
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${WEB_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres_data:
